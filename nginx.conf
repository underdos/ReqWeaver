server {
    server_name reqweaver.ncuz.my.id;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8060;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/reqweaver.ncuz.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reqweaver.ncuz.my.id/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = reqweaver.ncuz.my.id) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name reqweaver.ncuz.my.id;
    return 404;
}
